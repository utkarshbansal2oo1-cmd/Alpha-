services:
  postgres:
    image: postgres:16-alpine
    container_name: alphasource_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: alphasource
      POSTGRES_PASSWORD: alphasource
      POSTGRES_DB: alphasource
    ports:
      - "5432:5432"
    volumes:
      - alphasource_pgdata:/var/lib/postgresql/data

volumes:
  alphasource_pgdata:

